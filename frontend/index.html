<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zettelkasten</title>
  <link rel="stylesheet" href="chat.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: #000000;
      font-family: sans-serif;
    }

    #graph,
    #graph-2d {
      width: 100%;
      height: 100%;
    }

    #view-toggle {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .toggle-btn {
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.9);
      color: #000000;
      cursor: pointer;
      font-family: inherit;
      line-height: 1.3;
    }

    .toggle-btn:hover {
      background: rgba(0, 0, 0, 0.06);
    }

    .toggle-btn.active {
      background: #000000;
      color: #ffffff;
      border-color: #000000;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.92);
      z-index: 10;
    }

    #overlay.hidden {
      display: none;
    }

    .panel {
      position: fixed;
      z-index: 5;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.5;
      color: #000000;
    }

    #info-panel {
      top: 16px;
      left: 16px;
      max-width: 280px;
    }

    #info-panel h1 {
      font-size: 15px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    #info-panel p {
      color: #333333;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid rgba(0, 0, 0, 0.12);
      border-top-color: #333333;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      max-width: 520px;
      text-align: center;
      padding: 24px;
    }

    .error code {
      background: rgba(0, 0, 0, 0.06);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .hidden {
      display: none !important;
    }

    #note-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .note-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
    }

    .note-modal-panel {
      position: relative;
      z-index: 1;
      width: min(720px, 100%);
      max-height: 80vh;
      overflow: auto;
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
      padding: 24px 28px 28px;
    }

    #note-modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.06);
      color: #333333;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }

    #note-modal-close:hover {
      background: rgba(0, 0, 0, 0.12);
    }

    #note-modal-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
      padding-right: 36px;
    }

    .note-content {
      font-size: 14px;
      line-height: 1.65;
      color: #222222;
    }

    .note-content h1,
    .note-content h2,
    .note-content h3 {
      margin: 1.2em 0 0.5em;
      line-height: 1.3;
    }

    .note-content h1 { font-size: 1.5em; }
    .note-content h2 { font-size: 1.25em; }
    .note-content h3 { font-size: 1.1em; }

    .note-content p,
    .note-content ul,
    .note-content ol,
    .note-content blockquote {
      margin: 0.75em 0;
    }

    .note-content ul,
    .note-content ol {
      padding-left: 1.5em;
    }

    .note-content code {
      background: rgba(0, 0, 0, 0.06);
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 0.9em;
    }

    .note-content pre {
      background: rgba(0, 0, 0, 0.05);
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.75em 0;
    }

    .note-content pre code {
      background: none;
      padding: 0;
    }

    .note-content blockquote {
      border-left: 3px solid rgba(0, 0, 0, 0.2);
      padding-left: 12px;
      color: #444444;
    }

    .note-content a.wiki-link {
      color: #000000;
      text-decoration: underline;
      cursor: pointer;
    }

    .note-content a.wiki-link:hover {
      color: #333333;
    }

    .note-content .note-missing {
      color: #666666;
      font-style: italic;
    }

    .note-content img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0.75em 0;
      border-radius: 6px;
    }

    .note-content .youtube-embed {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      margin: 0.75em 0;
      border-radius: 6px;
      background: #000000;
    }

    .note-content .youtube-embed iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="overlay-content">
      <div class="spinner"></div>
      <div>Lade Graph-Daten…</div>
    </div>
  </div>

  <div id="info-panel" class="panel hidden">
    <h1>Worlding</h1>
    <p id="stats">–</p>
    <div id="view-toggle" role="group" aria-label="Ansicht wählen">
      <button type="button" class="toggle-btn active" data-view="3d">3D</button>
      <button type="button" class="toggle-btn" data-view="2d">2D</button>
    </div>
  </div>

  <div id="note-modal" class="hidden">
    <div class="note-modal-backdrop"></div>
    <div class="note-modal-panel">
      <button id="note-modal-close" type="button" aria-label="Schließen">×</button>
      <h2 id="note-modal-title"></h2>
      <div id="note-modal-body" class="note-content"></div>
    </div>
  </div>

  <div id="graph"></div>
  <div id="graph-2d" class="hidden"></div>

  <div id="chat-panel">
    <div id="chat-messages"></div>
    <form id="chat-form">
      <button id="chat-collapse" type="button" aria-label="Chat einklappen" title="Einklappen">⌄</button>
      <textarea id="chat-input" rows="1" placeholder="Frage stellen…" maxlength="2000"></textarea>
      <button id="chat-send" type="submit">Senden</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three-spritetext@1.8.2/dist/three-spritetext.min.js"></script>
  <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
  <script src="https://unpkg.com/force-graph@1.43.5/dist/force-graph.min.js"></script>
  <script>
    const overlay = document.getElementById('overlay');
    const overlayContent = document.getElementById('overlay-content');
    const infoPanel = document.getElementById('info-panel');
    const statsEl = document.getElementById('stats');
    const noteModal = document.getElementById('note-modal');
    const noteModalTitle = document.getElementById('note-modal-title');
    const noteModalBody = document.getElementById('note-modal-body');
    const noteModalClose = document.getElementById('note-modal-close');
    const noteModalBackdrop = noteModal.querySelector('.note-modal-backdrop');
    const graphEl = document.getElementById('graph');
    const graph2dEl = document.getElementById('graph-2d');
    const viewToggle = document.getElementById('view-toggle');

    let graphNodes = [];
    let nodeLookup = new Map();
    let graphRef = null;
    let graph2dRef = null;
    let sourceHighlightIds = new Set();
    let rawData = null;
    let activeView = '3d';

    const TARGET_SPAN = 300;
    const linkColorDefault = 'rgba(0, 0, 0, 0.25)';
    const linkColorHighlight = 'rgba(0, 0, 0, 0.95)';

    function applyNodeHighlight(graph) {
      if (!graph) return;
      graph.nodeColor((node) => (
        sourceHighlightIds.has(node.id) ? '#555555' : '#000000'
      ));
    }

    window.openNoteById = function (noteId) {
      const node = graphNodes.find((n) => n.id === noteId);
      if (!node) return;
      openNoteModal(node);
      if (activeView === '2d' && graph2dRef) {
        const gNode = graph2dRef.graphData().nodes.find((n) => n.id === noteId);
        if (gNode) {
          graph2dRef.centerAt(gNode.x, gNode.y, 800);
          graph2dRef.zoom(2, 800);
        }
      }
    };

    window.highlightChatSources = function (ids) {
      sourceHighlightIds = new Set(ids);
      applyNodeHighlight(graphRef);
      applyNodeHighlight(graph2dRef);
    };

    const WIKI_LINK_PATTERN = /\[\[([^\]|#^]+)(?:\|([^\]]*))?(?:#[^\]]*)?(?:\^[^\]]*)?\]\]/g;

    function normalizeKey(value) {
      return value.trim().toLowerCase();
    }

    function buildNodeLookup(nodes) {
      const lookup = new Map();
      nodes.forEach((node) => {
        lookup.set(normalizeKey(node.id), node);
        lookup.set(normalizeKey(node.title), node);
      });
      return lookup;
    }

    function resolveWikiTarget(target) {
      return nodeLookup.get(normalizeKey(target)) || null;
    }

    function preprocessWikiLinks(markdown) {
      return markdown.replace(WIKI_LINK_PATTERN, (match, target, alias) => {
        const label = (alias || target).trim();
        const node = resolveWikiTarget(target.trim());
        if (node) {
          return `[${label}](#wiki:${encodeURIComponent(node.id)})`;
        }
        return `<span class="note-missing">${label}</span>`;
      });
    }

    const YOUTUBE_URL_PATTERN = /(?:youtube\.com\/(?:watch\?(?:[^#\s]*&)?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;

    function parseYoutubeStart(value) {
      if (!value) return null;
      if (/^\d+$/.test(value)) return parseInt(value, 10);
      const secondsMatch = value.match(/^(\d+)s$/);
      if (secondsMatch) return parseInt(secondsMatch[1], 10);
      const parts = value.match(/(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s?)?/);
      if (!parts || !parts[0]) return null;
      const hours = parseInt(parts[1] || '0', 10);
      const minutes = parseInt(parts[2] || '0', 10);
      const seconds = parseInt(parts[3] || '0', 10);
      const total = hours * 3600 + minutes * 60 + seconds;
      return total > 0 ? total : null;
    }

    function parseYoutubeUrl(url) {
      if (!url) return null;
      const match = url.match(YOUTUBE_URL_PATTERN);
      if (!match) return null;
      let start = null;
      try {
        const parsed = new URL(url);
        start = parseYoutubeStart(parsed.searchParams.get('t') || parsed.searchParams.get('start'));
      } catch (_) {
        /* relative or malformed URL */
      }
      return { videoId: match[1], start };
    }

    function renderYoutubeEmbed({ videoId, start }) {
      const startQuery = start != null ? `?start=${start}` : '';
      return (
        `<div class="youtube-embed">`
        + `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}${startQuery}"`
        + ` title="YouTube video"`
        + ` allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"`
        + ` allowfullscreen loading="lazy"></iframe>`
        + `</div>`
      );
    }

    function renderNoteBody(body) {
      const prepared = preprocessWikiLinks(body);
      const renderer = new marked.Renderer();
      const defaultLink = renderer.link.bind(renderer);
      const defaultImage = renderer.image.bind(renderer);
      renderer.image = (href, title, text) => {
        if (href && href.startsWith('assets/')) {
          const alt = (text || '').replace(/"/g, '&quot;');
          const titleAttr = title ? ` title="${title.replace(/"/g, '&quot;')}"` : '';
          return `<img src="${href}" alt="${alt}"${titleAttr} loading="lazy" decoding="async">`;
        }
        return defaultImage(href, title, text);
      };
      renderer.link = (href, title, text) => {
        if (href && href.startsWith('#wiki:')) {
          const noteId = decodeURIComponent(href.slice(6));
          const titleAttr = title ? ` title="${title}"` : '';
          return `<a href="#" class="wiki-link" data-note-id="${noteId}"${titleAttr}>${text}</a>`;
        }
        const youtube = parseYoutubeUrl(href);
        if (youtube) {
          return renderYoutubeEmbed(youtube);
        }
        if (href && /\.pdf($|\?)/i.test(href)) {
          const titleAttr = title ? ` title="${title}"` : '';
          return `<a href="${href}" target="_blank" rel="noopener"${titleAttr}>${text}</a>`;
        }
        return defaultLink(href, title, text);
      };
      return marked.parse(prepared, { renderer });
    }

    function openNoteModal(node) {
      if (!node) return;

      noteModalTitle.textContent = node.title;

      if (!node.body) {
        noteModalBody.innerHTML = '<p class="note-missing">Inhalt nicht verfügbar — bitte <code>process_notes.py</code> neu ausführen.</p>';
      } else {
        noteModalBody.innerHTML = renderNoteBody(node.body);
      }

      noteModal.classList.remove('hidden');
      noteModalClose.focus();
    }

    function closeNoteModal() {
      noteModal.classList.add('hidden');
      noteModalBody.innerHTML = '';
    }

    noteModalClose.addEventListener('click', closeNoteModal);
    noteModalBackdrop.addEventListener('click', closeNoteModal);
    noteModalBody.addEventListener('click', (event) => {
      const link = event.target.closest('a.wiki-link');
      if (!link) return;
      event.preventDefault();
      const noteId = link.dataset.noteId;
      const targetNode = graphNodes.find((n) => n.id === noteId);
      if (targetNode) {
        openNoteModal(targetNode);
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && !noteModal.classList.contains('hidden')) {
        closeNoteModal();
      }
    });

    function showError(message) {
      overlay.classList.remove('hidden');
      overlayContent.innerHTML = `
        <div class="error">
          <h2 style="margin-bottom: 12px;">Daten konnten nicht geladen werden</h2>
          <p>${message}</p>
          <p style="margin-top: 16px; color: #333333;">
            Führe zuerst aus:<br>
            <code>python process_notes.py --vault /pfad/zum/vault</code>
          </p>
        </div>
      `;
    }

    function computeScale(nodes) {
      const xs = nodes.map((n) => n.x);
      const ys = nodes.map((n) => n.y);
      const zs = nodes.map((n) => n.z);
      const span = Math.max(
        Math.max(...xs) - Math.min(...xs),
        Math.max(...ys) - Math.min(...ys),
        Math.max(...zs) - Math.min(...zs),
        1,
      );
      return TARGET_SPAN / span;
    }

    function cloneLinks(links) {
      return links.map((link) => ({
        source: link.source?.id ?? link.source,
        target: link.target?.id ?? link.target,
      }));
    }

    function prepareGraphData3D(data) {
      const scale = computeScale(data.nodes);
      const nodes = data.nodes.map((node) => {
        const x = node.x * scale;
        const y = node.y * scale;
        const z = node.z * scale;
        return { ...node, x, y, z, fx: x, fy: y, fz: z };
      });
      return { nodes, links: cloneLinks(data.links) };
    }

    function prepareGraphData2D(data) {
      const scale = computeScale(data.nodes);
      const nodes = data.nodes.map((node) => ({
        id: node.id,
        title: node.title,
        body: node.body,
        x: node.x * scale + (Math.random() - 0.5) * 20,
        y: node.y * scale + (Math.random() - 0.5) * 20,
      }));
      return { nodes, links: cloneLinks(data.links) };
    }

    function fitGraphToView(Graph) {
      requestAnimationFrame(() => {
        Graph.zoomToFit(400, 80);
      });
    }

    function nodeRadius(val, relSize) {
      return Math.cbrt(val) * relSize;
    }

    function createLabelSprite(node, labelTextHeight, labelOffsetY) {
      const sprite = new SpriteText(node.title);
      sprite.material.depthWrite = false;
      sprite.material.transparent = true;
      sprite.color = '#000000';
      sprite.textHeight = labelTextHeight;
      sprite.fontFace = 'sans-serif';
      sprite.center.y = 0;
      sprite.position.y = labelOffsetY;
      node.__labelSprite = sprite;
      return sprite;
    }

    function updateLabelVisibility(Graph, graphData, nearDistance, farDistance, minOpacity) {
      const camPos = Graph.camera().position;
      const nodePos = new THREE.Vector3();

      graphData.nodes.forEach((node) => {
        const sprite = node.__labelSprite;
        if (!sprite) return;

        nodePos.set(node.x, node.y, node.z);
        const dist = camPos.distanceTo(nodePos);

        let opacity = 1;
        if (dist > nearDistance) {
          const t = Math.min(1, (dist - nearDistance) / (farDistance - nearDistance));
          opacity = 1 - t * (1 - minOpacity);
        }
        opacity = Math.max(minOpacity, Math.min(1, opacity));

        sprite.visible = true;
        sprite.material.opacity = opacity;
      });
    }

    function linkTouchesNode(link, node) {
      if (!node) return false;
      const sourceId = link.source.id ?? link.source;
      const targetId = link.target.id ?? link.target;
      return sourceId === node.id || targetId === node.id;
    }

    function initGraph(graphData, meta) {
      graphNodes = graphData.nodes;
      nodeLookup = buildNodeLookup(graphNodes);

      const nodeVal = 0.25;
      const nodeValHover = 0.5;
      const nodeRelSize = 4;
      const labelTextHeight = 4;
      const labelOffsetY = nodeRadius(nodeValHover, nodeRelSize) + labelTextHeight * 0.5 + 1;
      const labelNearDistance = 360;
      const labelFarDistance = 540;
      const labelMinOpacity = 0.25;
      let hoveredNode = null;

      const Graph = ForceGraph3D()(graphEl)
        .backgroundColor('#ffffff')
        .cooldownTicks(1)
        .graphData(graphData)
        .nodeThreeObject((node) => createLabelSprite(node, labelTextHeight, labelOffsetY))
        .nodeThreeObjectExtend(true)
        .nodeVal(nodeVal)
        .nodeRelSize(nodeRelSize)
        .nodeResolution(48)
        .nodeColor(() => '#000000')
        .nodeOpacity(1)
        .linkColor((link) => (
          linkTouchesNode(link, hoveredNode) ? linkColorHighlight : linkColorDefault
        ))
        .linkWidth((link) => (linkTouchesNode(link, hoveredNode) ? 1.2 : 0.6))
        .linkOpacity(1)
        .enableNodeDrag(false)
        .onNodeHover((node) => {
          hoveredNode = node || null;
          graphData.nodes.forEach((n) => { n.__hover = false; });
          if (node) {
            node.__hover = true;
          }
          Graph.nodeVal((n) => (n.__hover ? nodeValHover : nodeVal));
          Graph.linkColor(Graph.linkColor());
          Graph.linkWidth(Graph.linkWidth());
        })
        .onNodeClick((node) => openNoteModal(node));

      graphRef = Graph;
      applyNodeHighlight(Graph);

      Graph.d3Force('charge', null);
      Graph.d3Force('center', null);

      const linkForce = Graph.d3Force('link');
      if (linkForce) {
        linkForce.distance(80).strength(0);
      }

      let labelVisibilityRaf = null;
      function scheduleLabelVisibilityUpdate() {
        if (labelVisibilityRaf) cancelAnimationFrame(labelVisibilityRaf);
        labelVisibilityRaf = requestAnimationFrame(() => {
          labelVisibilityRaf = null;
          updateLabelVisibility(Graph, graphData, labelNearDistance, labelFarDistance, labelMinOpacity);
        });
      }

      Graph.controls().addEventListener('change', scheduleLabelVisibilityUpdate);

      const controls = Graph.controls();
      controls.enableDamping = true;
      controls.dampingFactor = 0.12;

      fitGraphToView(Graph);
      scheduleLabelVisibilityUpdate();

      statsEl.textContent = `${meta.nodeCount} Notizen · ${meta.linkCount} Links`;
      infoPanel.classList.remove('hidden');
      overlay.classList.add('hidden');
    }

    function apply2DLayoutForces(Graph) {
      const linkForce = Graph.d3Force('link');
      const chargeForce = Graph.d3Force('charge');
      Graph.enableNodeDrag(true);
      if (chargeForce) chargeForce.strength(-120);
      Graph.d3Force('center', null);
      if (linkForce) linkForce.distance(80).strength(1);
    }

    function refreshGraph2DSize() {
      if (!graph2dRef) return;
      graph2dRef.width(graph2dEl.clientWidth);
      graph2dRef.height(graph2dEl.clientHeight);
    }

    function setGraph2DData() {
      apply2DLayoutForces(graph2dRef);
      graph2dRef.graphData(prepareGraphData2D(rawData));
      applyNodeHighlight(graph2dRef);
      graph2dRef.d3ReheatSimulation();
      refreshGraph2DSize();
      fitGraphToView(graph2dRef);
    }

    function createGraph2D() {
      let hoveredNode = null;

      const Graph = ForceGraph()(graph2dEl)
        .backgroundColor('#ffffff')
        .nodeId('id')
        .nodeLabel((node) => node.title)
        .nodeRelSize(4)
        .nodeVal(1)
        .nodeColor(() => '#000000')
        .linkColor((link) => (
          linkTouchesNode(link, hoveredNode) ? linkColorHighlight : linkColorDefault
        ))
        .linkWidth((link) => (linkTouchesNode(link, hoveredNode) ? 1.5 : 0.8))
        .onNodeHover((node) => {
          hoveredNode = node || null;
          Graph.linkColor(Graph.linkColor());
          Graph.linkWidth(Graph.linkWidth());
        })
        .onNodeClick((node) => openNoteModal(node))
        .onNodeDragEnd((node) => {
          node.fx = node.x;
          node.fy = node.y;
        });

      graph2dRef = Graph;
      return Graph;
    }

    function ensureGraph2D() {
      if (!graph2dRef) {
        createGraph2D();
        setGraph2DData();
      } else {
        refreshGraph2DSize();
      }
      return graph2dRef;
    }

    function updateViewToggleButtons() {
      viewToggle.querySelectorAll('button[data-view]').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.view === activeView);
      });
    }

    function switchView(view) {
      if (view === activeView) return;
      activeView = view;

      if (view === '3d') {
        graphEl.classList.remove('hidden');
        graph2dEl.classList.add('hidden');
        applyNodeHighlight(graphRef);
      } else {
        graphEl.classList.add('hidden');
        graph2dEl.classList.remove('hidden');
        ensureGraph2D();
        fitGraphToView(graph2dRef);
        applyNodeHighlight(graph2dRef);
      }

      updateViewToggleButtons();
    }

    viewToggle.addEventListener('click', (event) => {
      const btn = event.target.closest('button[data-view]');
      if (!btn) return;
      switchView(btn.dataset.view);
    });

    fetch('./data.json')
      .then((response) => {
        if (!response.ok) {
          throw new Error('data.json nicht gefunden. Bitte process_notes.py ausführen.');
        }
        return response.json();
      })
      .then((data) => {
        if (!data.nodes || !data.links) {
          throw new Error('Ungültiges JSON-Format in data.json.');
        }
        rawData = {
          nodes: data.nodes,
          links: data.links.map((link) => ({ source: link.source, target: link.target })),
          meta: data.meta,
        };
        initGraph(prepareGraphData3D(rawData), rawData.meta || {
          nodeCount: rawData.nodes.length,
          linkCount: rawData.links.length,
          model: 'unbekannt',
        });
      })
      .catch((error) => {
        showError(error.message);
      });
  </script>
  <script src="chat.js"></script>
</body>
</html>
